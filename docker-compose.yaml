services:
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - webchat_network

  php:
    build: 
      context: .
      dockerfile: ./php/Dockerfile
    container_name: api
    restart: always
    ports:
      - "9000:9000"
    volumes:
      - ./src:/var/www/webchat
    networks:
      - webchat_network

  postgres:
    image: postgres:18.4
    container_name: postgres
    restart: always
    env_file:
      - ./postgres/.env
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - db_volume:/var/lib/db_volume
    networks:
      - webchat_network

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_volume:/var/lib/redis_volume
    networks:
      - webchat_network

volumes:
  db_volume:
  redis_volume:

networks:
  webchat_network: